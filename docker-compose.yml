services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flight_data_scrapper
      POSTGRES_USER: postgres
      # REQUIRED: Set DB_PASSWORD in your .env or environment. No weak defaults.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env or environment}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:?Set DB_PASSWORD}@db:5432/flight_data_scrapper
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # nginx now serves HTTPS and redirects http -> https (Cloudflare Origin
      # cert), so the old plain-http spider got a 301 and reported unhealthy
      # even though the site was serving fine. Check https on localhost with
      # --no-check-certificate (the Origin cert is for the public domain, not
      # 127.0.0.1). Matches the Dockerfile HEALTHCHECK.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --no-check-certificate --spider https://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=32M
      - /var/run:size=1M
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  postgres_data:
