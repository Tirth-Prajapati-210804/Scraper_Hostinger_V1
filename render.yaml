services:
  - type: web
    name: flight-harvester-backend
    env: docker
    dockerfilePath: Dockerfile
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health/ready
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: EXPOSE_API_DOCS
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SCRAPINGBEE_API_KEY
        sync: false
      - key: SCRAPINGBEE_API_KEYS
        sync: false
      - key: SCRAPINGBEE_COUNTRY_CODE
        value: "us"
      - key: SCRAPINGBEE_PREMIUM_PROXY
        value: "false"
      - key: SCRAPINGBEE_STEALTH_PROXY
        value: "false"
      - key: PROVIDER_TIMEOUT_SECONDS
        value: "60"
      - key: PROVIDER_CONCURRENCY_LIMIT
        value: "2"
      - key: PROVIDER_MIN_DELAY_SECONDS
        value: "0.5"
      - key: KAYAK_API_KEY
        sync: false
      - key: KAYAK_BASE_URL
        sync: false
